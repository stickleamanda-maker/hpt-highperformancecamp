<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HPT High Performance Training Camp</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f4f6f9; }
        .container { max-width: 900px; margin: 2rem auto; padding: 1rem; }
        .camp-photo { width: 100%; height: 240px; object-fit: cover; border-radius: 6px; margin-bottom: 1rem; }
        .banner-photo { width: 100%; height: 320px; object-fit: cover; border-radius: 8px; margin: 2rem 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h1>HPT High Performance Training Camp</h1>
        
        <div class="grid">
            <div class="card">
                <img src="pic1.jpg" alt="Training" class="camp-photo">
                <h2>What We Offer</h2>
            </div>
            <div class="card">
                <img src="pic2.jpg" alt="Recovery" class="camp-photo">
                <h2>Pricing</h2>
            </div>
        </div>
        
        <img src="pic3.jpg" alt="Banner" class="banner-photo">
    </div>
</body>
</html>
